version: '3.9'

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: pentagi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pentagi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pentagi}
      POSTGRES_DB: ${DB_NAME:-pentagi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pentagi} -d ${DB_NAME:-pentagi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pentagi-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: pentagi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-pentagi}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-pentagi}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pentagi-network

  # Main pentagi backend application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pentagi-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - app_logs:/app/logs
      - app_data:/app/data
    networks:
      - pentagi-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # increased start_period to give the app more time on my slower dev machine
      start_period: 120s

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: pentagi-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_logs:/var/log/nginx
    networks:
      - pentagi-network
    # keep nginx logs for debugging; rotate weekly to avoid filling disk
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "7"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_data:
    driver: local
  nginx_certs:
    driver: local
  nginx_logs:
    driver: local

networks:
  pentagi-network:
    driver: bridge
    name: pentagi-network
